---
# Persistent storage for models, custom nodes, and outputs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-storage
  namespace: ephemeral-boeqou
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ComfyUI application deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui-ephemeral
  namespace: ephemeral-boeqou
  labels:
    app: comfyui-ephemeral
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/instance: comfyui-ephemeral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comfyui-ephemeral
  template:
    metadata:
      labels:
        app: comfyui-ephemeral
    spec:
      # Pod security context for OpenShift compatibility
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
      - name: comfyui
        image: image-registry.openshift-image-registry.svc:5000/ephemeral-boeqou/comfyui-cpu:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8188
          name: http
          protocol: TCP
        # Container security context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        # CPU-only resource limits
        resources:
          requests:
            cpu: "10m"       # 10 millicores
            memory: "32Mi"   # 32 MB
          limits:
            cpu: "1000m"     # 1 core
            memory: "8Gi"    # 8 GB
        # Mount persistent storage
        volumeMounts:
        - name: models-storage
          mountPath: /app/ComfyUI/models
          subPath: models
        - name: models-storage
          mountPath: /app/ComfyUI/custom_nodes
          subPath: custom_nodes
        - name: models-storage
          mountPath: /app/ComfyUI/user
          subPath: user
        - name: models-storage
          mountPath: /app/ComfyUI/output
          subPath: output
        - name: models-storage
          mountPath: /app/ComfyUI/input
          subPath: input
        - name: models-storage
          mountPath: /app/ComfyUI/temp
          subPath: temp
      volumes:
      - name: models-storage
        persistentVolumeClaim:
          claimName: comfyui-storage

---
# Service for internal networking
apiVersion: v1
kind: Service
metadata:
  name: comfyui-ephemeral
  namespace: ephemeral-boeqou
  labels:
    app: comfyui-ephemeral
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/instance: comfyui-ephemeral
spec:
  type: ClusterIP
  selector:
    app: comfyui-ephemeral
  ports:
  - name: http
    port: 8188
    targetPort: 8188
    protocol: TCP

---
# OpenShift Route for external access
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: comfyui-ephemeral
  namespace: ephemeral-boeqou
  labels:
    app: comfyui-ephemeral
spec:
  to:
    kind: Service
    name: comfyui-ephemeral
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

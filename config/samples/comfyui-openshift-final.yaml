# ComfyUI OpenShift Final - Comprehensive CR with all operator features
apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-openshift-final
  namespace: default
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/instance: comfyui-openshift-final
    app.kubernetes.io/part-of: comfyui-operator
spec:
  # Container image from OpenShift internal registry
  image: "image-registry.openshift-image-registry.svc:5000/default/comfyui-gpu:latest"

  replicas: 1

  # ClusterIP + operator-managed OpenShift Routes for external access
  serviceType: ClusterIP

  # CPU-only mode (set enableGPU: true + gpuCount for GPU nodes)
  enableGPU: false
  # gpuCount: 1

  resources:
    requests:
      cpu: "100m"
      memory: "4Gi"
    limits:
      cpu: "1000m"
      memory: "8Gi"

  # Persistent storage — operator mounts subPaths for models, custom_nodes,
  # user, output, input. FileBrowser sidecar gets the full PVC at /data.
  storage:
    size: "50Gi"
    storageClassName: ""
    accessMode: ReadWriteOnce

  # Google OAuth2 — protects FileBrowser with oauth2-proxy sidecar
  oauth2:
    provider: google
    clientID: "972157929128-8e05eatpuckf4haqmj5hgfoi9rlhlm1n.apps.googleusercontent.com"
    clientSecretRef:
      name: google-oauth-secret
      key: client-secret

  # Node selector — uncomment to target specific nodes (e.g. GPU nodes)
  # nodeSelector:
  #   nvidia.com/gpu.present: "true"

  # Gateway API — uncomment for non-OpenShift clusters (operator auto-creates Routes on OpenShift)
  # gateway:
  #   name: "default-gateway"
  #   namespace: "gateway-system"
  #   hostname: "comfyui.apps.example.com"

  # Additional volumes — appended to operator-managed mounts
  # volumes:
  #   - name: extra-models
  #     persistentVolumeClaim:
  #       claimName: shared-models-pvc
  # volumeMounts:
  #   - name: extra-models
  #     mountPath: /app/ComfyUI/models/checkpoints

apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  labels:
    app.kubernetes.io/name: comfyui-operator
    app.kubernetes.io/managed-by: kustomize
  name: comfyui-test
spec:
  # CPU-only ComfyUI image with ComfyUI Manager
  image: localhost/comfyui:cpu

  # Single replica
  replicas: 1

  # Storage configuration for models
  storage:
    size: 10Gi
    accessMode: ReadWriteOnce

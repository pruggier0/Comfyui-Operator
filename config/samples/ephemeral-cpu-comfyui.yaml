apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-ephemeral
  namespace: ephemeral-boeqou
spec:
  # CPU-only ComfyUI image
  image: "default-route-openshift-image-registry.apps.ocp-beta-test.nerc.mghpcc.org/default/comfyui-gpu:latest"

  # Single replica for ephemeral testing
  replicas: 1

  # Service type
  serviceType: ClusterIP

  # CPU-only - no GPU
  enableGPU: false

  # Minimal resource requests and limits for ephemeral cluster
  resources:
    requests:
      cpu: "10m"      # 10 millicores
      memory: "32Mi"  # 32 MB
    limits:
      cpu: "1000m"    # 1 core
      memory: "8Gi"   # 8 GB

  # Small persistent storage for models/outputs
  storage:
    size: "5Gi"
    storageClassName: ""  # Use default storage class
    accessMode: ReadWriteOnce

---
# OpenShift Route for external access
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: comfyui-ephemeral
  namespace: ephemeral-boeqou
  labels:
    app: comfyui-ephemeral
spec:
  to:
    kind: Service
    name: comfyui-ephemeral
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

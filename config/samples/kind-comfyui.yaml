apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-kind
  namespace: default
spec:
  # CPU-only ComfyUI image from OpenShift internal registry
  # Note: Build and push ComfyUI image first with:
  #   cd test-image
  #   podman build -f Containerfile.cpu -t comfyui-cpu:latest .
  #   podman tag comfyui-cpu:latest default-route-openshift-image-registry.apps.beacon.example.com/default/comfyui-cpu:latest
  #   podman push default-route-openshift-image-registry.apps.beacon.example.com/default/comfyui-cpu:latest
  image: "image-registry.openshift-image-registry.svc:5000/default/comfyui-cpu:latest"

  # Number of replicas
  replicas: 1

  # Service type - ClusterIP for use with OpenShift Routes
  serviceType: ClusterIP

  # CPU-only - no GPU (filebrowser sidecar is automatically added by operator)
  enableGPU: false

  # Resource requests and limits for CPU-only workload
  resources:
    requests:
      cpu: "100m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"

  # Persistent storage configuration
  storage:
    # Size of the persistent volume
    size: "50Gi"

    # Access mode - ReadWriteOnce is recommended for block storage
    accessMode: ReadWriteOnce

    # Storage class - use local-path for development/testing
    storageClassName: local-path

  # OAuth2 configuration for FileBrowser authentication
  oauth2:
    # Provider: github, google, or oidc
    provider: "google"

    # OAuth2 Client ID
    clientID: "972157929128-8e05eatpuckf4haqmj5hgfoi9rlhlm1n.apps.googleusercontent.com"

    # Reference to secret containing OAuth2 client secret
    clientSecretRef:
      name: oauth2-client-secret
      key: client-secret

    # Allowed email addresses (optional - if empty, any authenticated user is allowed)
    allowedEmails:
      - "user@example.com"

    # Or use allowedDomains to allow entire domains:
    # allowedDomains:
    #   - "example.com"

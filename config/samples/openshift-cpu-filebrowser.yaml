apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-openshift-cpu
  namespace: default
spec:
  # CPU-only ComfyUI image
  # Build from test-image/Containerfile.cpu and push to OpenShift internal registry
  image: "image-registry.openshift-image-registry.svc:5000/default/comfyui-cpu:latest"

  # Number of replicas
  replicas: 1

  # Service type - ClusterIP is default and recommended for OpenShift
  # Use ClusterIP + Route for external access (OpenShift best practice)
  serviceType: ClusterIP

  # CPU-only - no GPU (filebrowser sidecar is automatically added by operator)
  enableGPU: false

  # Resource requests and limits for CPU-only workload
  # Using ratio constraints: CPU max 10x, memory max 2x
  resources:
    requests:
      cpu: "100m"      # 100 millicores
      memory: "4Gi"    # 4 GB
    limits:
      cpu: "1000m"     # 1 core (10x ratio)
      memory: "8Gi"    # 8 GB (2x ratio)

  # Persistent storage configuration
  storage:
    # Size of the persistent volume
    size: "50Gi"

    # Storage class - use OpenShift's default or specify one
    # Common OpenShift storage classes: gp2, gp3, ocs-storagecluster-ceph-rbd
    # Leave empty to use cluster default
    storageClassName: ""

    # Access mode - ReadWriteOnce is recommended for block storage
    accessMode: ReadWriteOnce

  # Environment variables for ComfyUI Manager compatibility
  env:
  - name: COMFYUI_MANAGER_SKIP_SECURITY_CHECK
    value: "true"
  - name: HOME
    value: "/tmp"

  # Override entrypoint to setup persistent storage and force CPU mode
  # This ensures custom node dependencies are installed at startup
  command: ["/bin/bash", "-c"]
  args:
  - |
    set -e
    echo "=== Setting up ComfyUI persistent storage ==="
    mkdir -p /app/ComfyUI/models/checkpoints \
             /app/ComfyUI/models/vae \
             /app/ComfyUI/models/loras \
             /app/ComfyUI/models/embeddings \
             /app/ComfyUI/models/controlnet \
             /app/ComfyUI/models/clip \
             /app/ComfyUI/models/clip_vision \
             /app/ComfyUI/models/text_encoders \
             /app/ComfyUI/models/diffusion_models \
             /app/ComfyUI/models/unet \
             /app/ComfyUI/models/upscale_models \
             /app/ComfyUI/models/hypernetworks \
             /app/ComfyUI/models/style_models \
             /app/ComfyUI/user \
             /app/ComfyUI/output \
             /app/ComfyUI/input \
             /app/ComfyUI/temp \
             /app/ComfyUI/custom_nodes
    echo "✓ Directory structure created"

    echo "=== Installing custom node dependencies ==="
    custom_nodes_with_deps=0
    for node_dir in /app/ComfyUI/custom_nodes/*; do
      if [ ! -d "$node_dir" ]; then continue; fi
      node_name=$(basename "$node_dir")

      if [ -f "$node_dir/requirements.txt" ]; then
        echo "→ Installing dependencies for: $node_name"
        pip install --no-cache-dir -r "$node_dir/requirements.txt" || echo "⚠ Warning: Failed to install dependencies for $node_name"
        custom_nodes_with_deps=$((custom_nodes_with_deps + 1))
      fi

      if [ -f "$node_dir/install.py" ]; then
        echo "→ Running install script for: $node_name"
        (cd "$node_dir" && python install.py) || echo "⚠ Warning: install.py failed for $node_name"
      fi
    done

    if [ $custom_nodes_with_deps -eq 0 ]; then
      echo "✓ No custom node dependencies to install"
    else
      echo "✓ Installed dependencies for $custom_nodes_with_deps custom node(s)"
    fi

    echo "=== Starting ComfyUI in CPU mode ==="
    exec python main.py --listen 0.0.0.0 --port 8188 --cpu

apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui
  namespace: default
spec:
  # ComfyUI application image from the OpenShift internal registry
  # Build and push:
  #   podman build -t comfyui-cpu:latest -f test-image/Dockerfile test-image/
  #   podman tag comfyui-cpu:latest <registry-route>/<namespace>/comfyui-cpu:latest
  #   podman push <registry-route>/<namespace>/comfyui-cpu:latest
  image: "image-registry.openshift-image-registry.svc:5000/<namespace>/comfyui-cpu:latest"

  replicas: 1
  serviceType: ClusterIP
  enableGPU: false

  # Uncomment for GPU workloads
  # enableGPU: true
  # gpuCount: 1

  resources:
    requests:
      cpu: "100m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"

  storage:
    size: "50Gi"
    storageClassName: ""
    accessMode: ReadWriteOnce

  # Optional: constrain pods to specific nodes
  # nodeSelector:
  #   kubernetes.io/hostname: <node-name>

  # Optional: override auto-detected fsGroup
  # fsGroup: 1000

  # Optional: OAuth2 authentication for filebrowser
  # Create the secret first:
  #   oc create secret generic oauth2-client-secret --from-literal=client-secret=<your-secret>
  # oauth2:
  #   provider: "google"
  #   clientID: "<your-client-id>"
  #   clientSecretRef:
  #     name: oauth2-client-secret
  #     key: client-secret
  #   allowedEmails:
  #     - "user@example.com"
  #   allowedDomains:
  #     - "example.com"

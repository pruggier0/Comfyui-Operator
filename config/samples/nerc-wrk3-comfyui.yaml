apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-nerc
  namespace: default
spec:
  # Custom GPU-enabled ComfyUI image
  image: "default-route-openshift-image-registry.apps.ocp-beta-test.nerc.mghpcc.org/default/comfyui-gpu:latest"

  # Single replica (wrk-3 has limited available GPUs)
  replicas: 1

  # Service type
  serviceType: ClusterIP

  # Enable GPU support - request 1 GPU (3/4 already allocated on wrk-3)
  enableGPU: true
  gpuCount: 1

  # Target wrk-3 node specifically
  nodeSelector:
    kubernetes.io/hostname: wrk-3

  # Resource requests and limits for GPU workload
  resources:
    requests:
      cpu: "4000m"
      memory: "16Gi"
    limits:
      cpu: "16000m"
      memory: "32Gi"
      # nvidia.com/gpu: 1 will be added automatically by enableGPU

  # Persistent storage - 50Gi for models and outputs
  storage:
    size: "50Gi"
    # Use default storage class
    storageClassName: ""
    accessMode: ReadWriteOnce

---
# OpenShift Route for external access
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: comfyui-nerc
  namespace: default
  labels:
    app: comfyui-nerc
spec:
  to:
    kind: Service
    name: comfyui-nerc
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

apiVersion: comfy.redhat.com/v1alpha1
kind: ComfyUI
metadata:
  name: comfyui-basic
  namespace: default
spec:
  image: ghcr.io/ai-dock/comfyui:latest
  replicas: 1
  storage:
    size: 10Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
